name: Appaloft Deploy
description: Run an Appaloft deployment from GitHub Actions through pure SSH CLI mode or self-hosted server API mode.

inputs:
  command:
    description: Wrapper command to run. Use deploy for deployments, preview-cleanup for pull request cleanup, or install-console to install or upgrade a self-hosted console over SSH.
    required: false
    default: deploy
  version:
    description: Appaloft release tag, for example v0.9.0. Use latest for the latest stable release.
    required: false
    default: latest
  config:
    description: Optional Appaloft config path. When omitted, appaloft.yml is used only if it exists.
    required: false
    default: ""
  source:
    description: Source path or locator passed to appaloft deploy.
    required: false
    default: "."
  runtime-name:
    description: Trusted runtime name override.
    required: false
    default: ""
  ssh-host:
    description: SSH target host for pure SSH deployments.
    required: false
    default: ""
  ssh-user:
    description: SSH username.
    required: false
    default: ""
  ssh-port:
    description: SSH port.
    required: false
    default: ""
  ssh-private-key:
    description: SSH private key value. Written to a runner temp file before invoking Appaloft.
    required: false
    default: ""
  ssh-private-key-file:
    description: Existing runner-local SSH private key file.
    required: false
    default: ""
  console-url:
    description: Public self-hosted console origin configured during command=install-console. Defaults to https://<console-domain> or http://<ssh-host>:<console-http-port>.
    required: false
    default: ""
  console-domain:
    description: Public self-hosted console domain used to derive https://<domain> when console-url is empty.
    required: false
    default: ""
  console-database:
    description: Self-hosted console database backend for command=install-console.
    required: false
    default: "pglite"
  console-orchestrator:
    description: Self-hosted console Docker orchestrator for command=install-console.
    required: false
    default: "compose"
  console-http-host:
    description: Host bind address passed to the self-hosted console installer.
    required: false
    default: "0.0.0.0"
  console-http-port:
    description: Host HTTP port passed to the self-hosted console installer.
    required: false
    default: "3001"
  console-install-dir:
    description: Remote install directory passed to the self-hosted console installer. Defaults to the installer default.
    required: false
    default: ""
  console-compose-project-name:
    description: Docker Compose project name passed to the self-hosted console installer.
    required: false
    default: "appaloft"
  console-swarm-stack-name:
    description: Docker Swarm stack name passed to the self-hosted console installer.
    required: false
    default: "appaloft"
  console-swarm-init:
    description: Initialize a single-node Swarm manager on the SSH host when command=install-console and console-orchestrator=swarm.
    required: false
    default: "false"
  console-swarm-advertise-addr:
    description: Optional advertise address passed to docker swarm init for command=install-console.
    required: false
    default: ""
  console-image:
    description: Appaloft console image repository or full image reference passed to the self-hosted console installer.
    required: false
    default: "ghcr.io/appaloft/appaloft"
  console-installer-url:
    description: Override URL for the self-hosted install.sh script used by command=install-console.
    required: false
    default: ""
  console-skip-docker-install:
    description: Require Docker Engine to already exist on the SSH host when command=install-console.
    required: false
    default: "false"
  server-provider:
    description: Server provider key.
    required: false
    default: "generic-ssh"
  server-proxy-kind:
    description: Server proxy kind.
    required: false
    default: ""
  state-backend:
    description: Appaloft state backend. Defaults to ssh-pglite when ssh-host is supplied.
    required: false
    default: ""
  environment-variables:
    description: Newline-separated environment variables passed as repeated CLI --env values in pure CLI mode.
    required: false
    default: ""
  secret-variables:
    description: Newline-separated secret variables passed as repeated CLI --secret values in pure CLI mode.
    required: false
    default: ""
  preview:
    description: Preview mode. The first accepted value is pull-request.
    required: false
    default: ""
  preview-id:
    description: Trusted preview scope, for example pr-123.
    required: false
    default: ""
  preview-domain-template:
    description: Trusted preview hostname template rendered by the workflow or action.
    required: false
    default: ""
  preview-tls-mode:
    description: Preview TLS mode for preview-domain-template.
    required: false
    default: ""
  require-preview-url:
    description: Fail when no public preview URL is resolved.
    required: false
    default: "false"
  pr-comment:
    description: Post or update a pull request comment with preview, deployment, cleanup, and console links.
    required: false
    default: "false"
  github-token:
    description: "GitHub token used only when pr-comment is true. The workflow must grant pull-requests: write or issues: write."
    required: false
    default: ""
  control-plane-mode:
    description: Control-plane mode. Use none for pure SSH CLI mode or self-hosted for server API mode.
    required: false
    default: ""
  control-plane-url:
    description: Self-hosted Appaloft server endpoint for server API mode.
    required: false
    default: ""
  appaloft-token:
    description: Optional bearer token for self-hosted Appaloft server API mode.
    required: false
    default: ""
  use-oidc:
    description: Future GitHub OIDC exchange toggle. Not yet supported.
    required: false
    default: "false"
  server-config-deploy:
    description: Experimental self-hosted server config deploy mode. Requires server-side source package and config bootstrap support.
    required: false
    default: "false"
  project-id:
    description: Trusted Appaloft project id for self-hosted server API mode.
    required: false
    default: ""
  environment-id:
    description: Trusted Appaloft environment id for self-hosted server API mode.
    required: false
    default: ""
  resource-id:
    description: Trusted Appaloft resource id for self-hosted server API mode.
    required: false
    default: ""
  server-id:
    description: Trusted Appaloft deployment target id for self-hosted server API mode.
    required: false
    default: ""
  destination-id:
    description: Optional trusted Appaloft destination id for self-hosted server API mode.
    required: false
    default: ""

outputs:
  appaloft-version:
    description: Installed Appaloft CLI version.
    value: ${{ steps.install.outputs.appaloft-version }}
  appaloft-target:
    description: Installed Appaloft release target.
    value: ${{ steps.install.outputs.appaloft-target }}
  preview-id:
    description: Preview id when preview mode is selected.
    value: ${{ steps.deploy.outputs.preview-id }}
  preview-url:
    description: Preview URL resolved by the CLI from generated/default access or custom preview route intent.
    value: ${{ steps.deploy.outputs.preview-url }}
  deployment-id:
    description: Deployment id accepted by Appaloft.
    value: ${{ steps.deploy.outputs.deployment-id }}
  deployment-url:
    description: Self-hosted Appaloft console deployment detail URL when available.
    value: ${{ steps.deploy.outputs.deployment-url }}
  console-url:
    description: Self-hosted Appaloft console URL installed by install-console or used by server API mode.
    value: ${{ steps.deploy.outputs.console-url }}
  preview-cleanup-status:
    description: Preview cleanup status when command is preview-cleanup.
    value: ${{ steps.deploy.outputs.preview-cleanup-status }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CONTROL_PLANE_MODE: ${{ inputs.control-plane-mode }}
        INPUT_CONTROL_PLANE_URL: ${{ inputs.control-plane-url }}
      run: bash "$GITHUB_ACTION_PATH/scripts/resolve-control-plane.sh"

    - id: install
      if: ${{ steps.resolve.outputs.control-plane-mode == 'none' && inputs.command != 'install-console' }}
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ github.token }}
      run: $GITHUB_ACTION_PATH/scripts/install-appaloft.sh

    - id: deploy
      shell: bash
      env:
        APPALOFT_BIN: ${{ steps.install.outputs.appaloft-bin }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_RUNTIME_NAME: ${{ inputs.runtime-name }}
        INPUT_SSH_HOST: ${{ inputs.ssh-host }}
        INPUT_SSH_USER: ${{ inputs.ssh-user }}
        INPUT_SSH_PORT: ${{ inputs.ssh-port }}
        INPUT_SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
        INPUT_SSH_PRIVATE_KEY_FILE: ${{ inputs.ssh-private-key-file }}
        INPUT_CONSOLE_URL: ${{ inputs.console-url }}
        INPUT_CONSOLE_DOMAIN: ${{ inputs.console-domain }}
        INPUT_CONSOLE_DATABASE: ${{ inputs.console-database }}
        INPUT_CONSOLE_ORCHESTRATOR: ${{ inputs.console-orchestrator }}
        INPUT_CONSOLE_HTTP_HOST: ${{ inputs.console-http-host }}
        INPUT_CONSOLE_HTTP_PORT: ${{ inputs.console-http-port }}
        INPUT_CONSOLE_INSTALL_DIR: ${{ inputs.console-install-dir }}
        INPUT_CONSOLE_COMPOSE_PROJECT_NAME: ${{ inputs.console-compose-project-name }}
        INPUT_CONSOLE_SWARM_STACK_NAME: ${{ inputs.console-swarm-stack-name }}
        INPUT_CONSOLE_SWARM_INIT: ${{ inputs.console-swarm-init }}
        INPUT_CONSOLE_SWARM_ADVERTISE_ADDR: ${{ inputs.console-swarm-advertise-addr }}
        INPUT_CONSOLE_IMAGE: ${{ inputs.console-image }}
        INPUT_CONSOLE_INSTALLER_URL: ${{ inputs.console-installer-url }}
        INPUT_CONSOLE_SKIP_DOCKER_INSTALL: ${{ inputs.console-skip-docker-install }}
        INPUT_SERVER_PROVIDER: ${{ inputs.server-provider }}
        INPUT_SERVER_PROXY_KIND: ${{ inputs.server-proxy-kind }}
        INPUT_STATE_BACKEND: ${{ inputs.state-backend }}
        INPUT_ENVIRONMENT_VARIABLES: ${{ inputs.environment-variables }}
        INPUT_SECRET_VARIABLES: ${{ inputs.secret-variables }}
        INPUT_PREVIEW: ${{ inputs.preview }}
        INPUT_PREVIEW_ID: ${{ inputs.preview-id }}
        INPUT_PREVIEW_DOMAIN_TEMPLATE: ${{ inputs.preview-domain-template }}
        INPUT_PREVIEW_TLS_MODE: ${{ inputs.preview-tls-mode }}
        INPUT_REQUIRE_PREVIEW_URL: ${{ inputs.require-preview-url }}
        INPUT_PR_COMMENT: ${{ inputs.pr-comment }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_CONTROL_PLANE_MODE: ${{ steps.resolve.outputs.control-plane-mode }}
        INPUT_CONTROL_PLANE_URL: ${{ steps.resolve.outputs.control-plane-url }}
        INPUT_APPALOFT_TOKEN: ${{ inputs.appaloft-token }}
        INPUT_USE_OIDC: ${{ inputs.use-oidc }}
        INPUT_SERVER_CONFIG_DEPLOY: ${{ inputs.server-config-deploy }}
        INPUT_PROJECT_ID: ${{ inputs.project-id }}
        INPUT_ENVIRONMENT_ID: ${{ inputs.environment-id }}
        INPUT_RESOURCE_ID: ${{ inputs.resource-id }}
        INPUT_SERVER_ID: ${{ inputs.server-id }}
        INPUT_DESTINATION_ID: ${{ inputs.destination-id }}
      run: $GITHUB_ACTION_PATH/scripts/run-deploy.sh
