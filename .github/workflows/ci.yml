name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate wrapper scripts
        run: bash -n scripts/install-appaloft.sh scripts/run-deploy.sh scripts/resolve-control-plane.sh

      - name: Validate dry-run preview mapping
        env:
          APPALOFT_BIN: /opt/appaloft/appaloft
          APPALOFT_DEPLOY_ACTION_DRY_RUN: "true"
          INPUT_CONFIG: appaloft.preview.yml
          INPUT_SOURCE: "."
          INPUT_SSH_HOST: 203.0.113.10
          INPUT_PREVIEW: pull-request
          INPUT_PREVIEW_ID: pr-1
          INPUT_PREVIEW_DOMAIN_TEMPLATE: pr-1.preview.example.com
          INPUT_PREVIEW_TLS_MODE: disabled
          INPUT_REQUIRE_PREVIEW_URL: "true"
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export RUNNER_TEMP="$tmp"
          export GITHUB_OUTPUT="$tmp/github-output"
          export APPALOFT_DEPLOY_ACTION_ARGV_PATH="$tmp/argv"

          bash scripts/run-deploy.sh

          grep -q -- "--preview-output-file" "$tmp/argv"
          grep -q '^preview-id=pr-1$' "$tmp/github-output"
          grep -q '^preview-url=http://pr-1.preview.example.com$' "$tmp/github-output"

      - name: Validate dry-run self-hosted preview deploy
        env:
          APPALOFT_DEPLOY_ACTION_DRY_RUN: "true"
          INPUT_CONFIG: appaloft.preview.yml
          INPUT_CONTROL_PLANE_MODE: self-hosted
          INPUT_CONTROL_PLANE_URL: https://console.example.com/
          INPUT_PREVIEW: pull-request
          INPUT_PREVIEW_ID: pr-1
          INPUT_PROJECT_ID: prj_console
          INPUT_ENVIRONMENT_ID: env_preview
          INPUT_RESOURCE_ID: res_preview
          INPUT_SERVER_ID: srv_prod
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export GITHUB_OUTPUT="$tmp/github-output"
          export APPALOFT_DEPLOY_ACTION_ARGV_PATH="$tmp/argv"

          bash scripts/run-deploy.sh

          grep -q '^GET https://console.example.com/api/version$' "$tmp/argv"
          grep -q '^POST https://console.example.com/api/action/deployments/from-source-link$' "$tmp/argv"
          grep -q '^preview-id=pr-1$' "$tmp/github-output"
          grep -q '^console-url=https://console.example.com$' "$tmp/github-output"

      - name: Validate dry-run self-hosted server config deploy
        env:
          APPALOFT_DEPLOY_ACTION_DRY_RUN: "true"
          INPUT_CONFIG: appaloft.yml
          INPUT_CONTROL_PLANE_MODE: self-hosted
          INPUT_CONTROL_PLANE_URL: https://console.example.com/
          INPUT_SERVER_CONFIG_DEPLOY: "true"
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export GITHUB_OUTPUT="$tmp/github-output"
          export APPALOFT_DEPLOY_ACTION_ARGV_PATH="$tmp/argv"

          bash scripts/run-deploy.sh

          grep -q '^GET https://console.example.com/api/version$' "$tmp/argv"
          grep -q '^POST https://console.example.com/api/action/deployments/from-config-package$' "$tmp/argv"
          grep -q '^console-url=https://console.example.com$' "$tmp/github-output"

      - name: Validate dry-run console install
        env:
          APPALOFT_DEPLOY_ACTION_DRY_RUN: "true"
          INPUT_COMMAND: install-console
          INPUT_VERSION: v0.9.1
          INPUT_SSH_HOST: 203.0.113.10
          INPUT_CONSOLE_DOMAIN: console.example.com
          INPUT_CONSOLE_DATABASE: pglite
          INPUT_CONSOLE_ORCHESTRATOR: swarm
          INPUT_CONSOLE_SWARM_STACK_NAME: appaloft-console
          INPUT_CONSOLE_SWARM_INIT: "true"
          INPUT_CONSOLE_SKIP_DOCKER_INSTALL: "true"
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export RUNNER_TEMP="$tmp"
          export GITHUB_OUTPUT="$tmp/github-output"
          export APPALOFT_DEPLOY_ACTION_ARGV_PATH="$tmp/argv"

          bash scripts/run-deploy.sh

          grep -q '^SSH root@203.0.113.10:22$' "$tmp/argv"
          grep -q '^INSTALLER https://github.com/appaloft/appaloft/releases/download/v0.9.1/install.sh$' "$tmp/argv"
          grep -q -- "--orchestrator 'swarm'" "$tmp/argv"
          grep -q -- "--stack-name 'appaloft-console'" "$tmp/argv"
          grep -q -- "--swarm-init" "$tmp/argv"
          grep -q '^HEALTH https://console.example.com/api/health$' "$tmp/argv"
          grep -q '^console-url=https://console.example.com$' "$tmp/github-output"

      - name: Opt-in exact-version install smoke
        if: ${{ vars.APPALOFT_INSTALL_SMOKE_VERSION != '' }}
        env:
          INPUT_VERSION: ${{ vars.APPALOFT_INSTALL_SMOKE_VERSION }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          export RUNNER_TEMP="$tmp"
          export GITHUB_OUTPUT="$tmp/github-output"

          bash scripts/install-appaloft.sh

          appaloft_bin="$(sed -n 's/^appaloft-bin=//p' "$tmp/github-output" | head -n 1)"
          test -n "$appaloft_bin"
          test -x "$appaloft_bin"
